<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    padding:6px;
    font-family:system-ui, Arial;
    background:#f2f2f2;
}

/* WRAPPER */
.table-wrap{
    width:100%;
    background:#fff;
    border:1px solid #ccc;
    border-radius:6px;
    overflow:hidden; /* IMPORTANT: no scroll */
}

/* TABLE */
table{
    width:100%;
    border-collapse:collapse;
    table-layout:fixed; /* KEY FIX */
}

/* HEADER */
thead th{
    background:#f1f1f1;
    font-size:13px;
    position:sticky;
    top:0;
    z-index:2;
}

/* COLUMN WIDTH CONTROL */
th:nth-child(1), td:nth-child(1){width:10%;}
th:nth-child(2), td:nth-child(2){width:60%;}
th:nth-child(3), td:nth-child(3){width:25%;}


/* FILTER */
.filter-row th{
    background:#fafafa;
    position:sticky;
    top:32px;
}

/* CELL */
th, td{
    border:1px solid #ddd;
    padding:6px;
    font-size:12px;

    /* KEY FOR MOBILE */
    word-break:break-word;
    white-space:normal;
}

/* INPUT */
.filter-row input{
    width:100%;
    padding:4px;
    font-size:12px;
    border:1px solid #bbb;
    border-radius:3px;
    box-sizing:border-box;
}

/* ROW STRIPE */
tbody tr:nth-child(even){
    background:#fafafa;
}

.empty{
    text-align:center;
    padding:10px;
}
</style>
</head>

<body>

<div class="table-wrap">
    <table>
        <thead id="thead"></thead>
        <tbody id="tbody"></tbody>
    </table>
</div>

<script>

const sheetUrl = 'https://docs.google.com/spreadsheets/d/1iKSsjRrfpAEYwhMDqV_Xv_AFUc-fnvlc/export?format=csv';

let rawData = [];
let headers = [];
let visibleIndexes = [];

async function init(){
    const res = await fetch(sheetUrl);
    const text = await res.text();

    const rows = parseCSV(text);

    headers = rows[0];
    rawData = rows.slice(1);

    // HIDE LAST 2 COLUMNS
    visibleIndexes = headers.map((_,i)=>i).slice(0, headers.length - 2);

    buildTable();
}

function parseCSV(text){
    const rows = [];
    let row = [], cell = '', insideQuotes = false;

    for(let i=0;i<text.length;i++){
        const c = text[i], next = text[i+1];

        if(c === '"'){
            if(insideQuotes && next === '"'){
                cell += '"'; i++;
            }else{
                insideQuotes = !insideQuotes;
            }
        }
        else if(c === ',' && !insideQuotes){
            row.push(cell); cell='';
        }
        else if((c === '\n' || c === '\r') && !insideQuotes){
            if(cell !== '' || row.length){
                row.push(cell);
                rows.push(row);
                row=[]; cell='';
            }
        }
        else{
            cell += c;
        }
    }

    if(cell !== '' || row.length){
        row.push(cell);
        rows.push(row);
    }

    return rows;
}

function buildTable(){
    const thead = document.getElementById('thead');

    // HEADER
    const tr1 = document.createElement('tr');
    visibleIndexes.forEach(i=>{
        const th = document.createElement('th');
        th.textContent = headers[i];
        tr1.appendChild(th);
    });
    thead.appendChild(tr1);

    // FILTER ROW
    const tr2 = document.createElement('tr');
    tr2.className = 'filter-row';

    visibleIndexes.forEach(()=>{
        const th = document.createElement('th');
        const input = document.createElement('input');

        input.addEventListener('input', filter);

        th.appendChild(input);
        tr2.appendChild(th);
    });

    thead.appendChild(tr2);

    render(rawData);
}

function render(data){
    const tbody = document.getElementById('tbody');
    tbody.innerHTML = '';

    if(!data.length){
        const tr = document.createElement('tr');
        const td = document.createElement('td');
        td.colSpan = visibleIndexes.length;
        td.className = 'empty';
        td.textContent = 'No data';
        tr.appendChild(td);
        tbody.appendChild(tr);
        return;
    }

    data.forEach(row=>{
        const tr = document.createElement('tr');

        visibleIndexes.forEach(i=>{
            const td = document.createElement('td');
            td.textContent = row[i] || '';
            tr.appendChild(td);
        });

        tbody.appendChild(tr);
    });
}

function filter(){
    const inputs = document.querySelectorAll('.filter-row input');

    let result = rawData.filter(row=>{
        return visibleIndexes.every((colIndex, i)=>{
            const val = inputs[i].value.toLowerCase().trim();
            if(!val) return true;
            return (row[colIndex] || '').toLowerCase().includes(val);
        });
    });

    // 👉 SORT BY "Town" COLUMN (index 2 in visible columns)
    const townIndex = visibleIndexes[2];

    result.sort((a, b) => {
        return (a[townIndex] || '').localeCompare(b[townIndex] || '');
    });

    render(result);
}

init();

</script>

</body>
</html>
